{% extends "base.html" %}

{% block title %}Trigger Run{% endblock %}

{% block content %}
<div class="space-y-6">
  <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8">
    <div>
      <p class="text-sm font-semibold text-blue-600 dark:text-cyan-400 mb-1 tracking-wide uppercase">
        Pipeline Action
      </p>
      <h1 class="text-3xl font-bold tracking-tight text-surface-900 dark:text-white">Trigger Run</h1>
    </div>
  </div>

  <div class="bg-white dark:bg-surface-900 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:border dark:border-surface-800 overflow-hidden p-6 sm:p-8 max-w-2xl">
    <form method="POST" action="/trigger" class="space-y-4" x-data="{ loading: false }" @submit="loading = true">
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">

      <div>
        <label for="schedule" class="block text-sm font-medium mb-1.5">Schedule (optional)</label>
        <select id="schedule" name="schedule_name" class="form-input">
          <option value="">— Ad-hoc run —</option>
          {% for sched in schedules %}
            <option value="{{ sched.name }}">{{ sched.name }} ({{ sched.cron_expr }})</option>
          {% endfor %}
        </select>
        <p class="text-xs text-surface-700/50 dark:text-surface-200/40 mt-1">Select a schedule or leave empty for a one-off run</p>
      </div>

      <div>
        <label for="topics" class="block text-sm font-medium mb-1.5">Topics (comma-separated)</label>
        <input type="text" id="topics" name="topics"
               class="form-input"
               placeholder="AI, ML, LLM">
      </div>

      <div>
        <label for="days" class="block text-sm font-medium mb-1.5">Timeframe (days)</label>
        <input type="number" id="days" name="days" min="1" max="90" value="7"
               class="form-input">
      </div>

      <div class="pt-2">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="use_smart_planner" value="true" class="rounded border-surface-300 text-primary-600 focus:ring-primary-500 w-4 h-4">
          <span class="text-sm font-medium text-surface-900 dark:text-surface-100">Use Smart Planner (LLM Expansion)</span>
        </label>
        <p class="text-xs text-surface-500 dark:text-surface-400 mt-1 ml-6">If unchecked, the topics above will be used exactly as search queries.</p>
      </div>

      <button type="submit"
              class="inline-flex items-center justify-center w-full px-4 py-2.5 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white text-sm font-semibold rounded-xl shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-0.5 transition-all duration-200"
              :disabled="loading"
              :class="{ 'btn-loading': loading }">
        <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" x-show="!loading">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
        </svg>
        <span x-text="loading ? 'Starting…' : 'Start Pipeline Run'"></span>
      </button>
    </form>
  </div>
</div>
{% endblock %}
