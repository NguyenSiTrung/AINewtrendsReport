<!-- Flash messages partial — auto-dismiss after 5 seconds -->
{% set flash_messages = get_flashed_messages(request) %}
{% if flash_messages %}
  <div class="px-4 sm:px-6 lg:px-8 pt-4">
    {% for msg in flash_messages %}
      <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100 translate-y-0"
           x-transition:leave-end="opacity-0 -translate-y-2"
           class="fade-in mb-3 flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-medium
                  {% if msg.category == 'success' %}
                    bg-success/10 text-success border border-success/20
                  {% elif msg.category == 'error' %}
                    bg-danger/10 text-danger border border-danger/20
                  {% elif msg.category == 'warning' %}
                    bg-warning/10 text-warning border border-warning/20
                  {% else %}
                    bg-info/10 text-info border border-info/20
                  {% endif %}">
        <span class="flex-1">{{ msg.text }}</span>
        <button @click="show = false" class="opacity-70 hover:opacity-100 transition-opacity">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    {% endfor %}
  </div>
{% endif %}
