<div id="llm-status-badge" hx-swap-oob="true" class="flex items-center gap-2.5 px-4 py-2 rounded-xl border backdrop-blur-md {% if llm_status.connected %}bg-emerald-500/10 border-emerald-500/20{% else %}bg-rose-500/10 border-rose-500/20{% endif %}">
  <span class="relative flex h-2.5 w-2.5">
    <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 {% if llm_status.connected %}bg-emerald-400{% else %}bg-rose-400{% endif %}"></span>
    <span class="relative inline-flex rounded-full h-2.5 w-2.5 {% if llm_status.connected %}bg-emerald-400{% else %}bg-rose-400{% endif %}"></span>
  </span>
  <span class="text-sm font-semibold {% if llm_status.connected %}text-emerald-300{% else %}text-rose-300{% endif %}">
    {% if llm_status.connected %}Endpoint Connected{% else %}Connection Offline{% endif %}
  </span>
</div>

{% if llm_status.connected %}
<div class="flex items-start gap-3 p-3 bg-emerald-50 dark:bg-emerald-900/10 border border-emerald-100 dark:border-emerald-800/50 rounded-xl">
  <div class="w-8 h-8 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center shrink-0">
    <svg class="w-4 h-4 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
    </svg>
  </div>
  <div>
    <p class="text-sm font-semibold text-emerald-900 dark:text-emerald-300">Connection Successful</p>
    <p class="text-xs text-emerald-700/80 dark:text-emerald-400/80 mt-0.5">Latency: <span class="font-mono">{{ llm_status.latency_ms }}ms</span></p>
  </div>
</div>
{% else %}
<div class="flex items-start gap-3 p-3 bg-rose-50 dark:bg-rose-900/10 border border-rose-100 dark:border-rose-800/50 rounded-xl">
  <div class="w-8 h-8 rounded-full bg-rose-100 dark:bg-rose-900/30 flex items-center justify-center shrink-0">
    <svg class="w-4 h-4 text-rose-600 dark:text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </div>
  <div>
    <p class="text-sm font-semibold text-rose-900 dark:text-rose-300">Connection Failed</p>
    <p class="text-xs text-rose-700/80 dark:text-rose-400/80 mt-1 break-all line-clamp-3" title="{{ llm_status.error }}">{{ llm_status.error or "Unknown error" }}</p>
  </div>
</div>
{% endif %}

<button type="button" @click="testConnection" hx-get="/llm/probe" hx-target="#llm-status-card-content" class="w-full py-2 px-4 bg-surface-100 dark:bg-surface-800 hover:bg-surface-200 dark:hover:bg-surface-700 text-surface-700 dark:text-surface-300 text-xs font-semibold rounded-lg transition-colors border border-surface-200 dark:border-surface-700 flex items-center justify-center gap-2" :disabled="testing" :class="{'opacity-50 cursor-wait': testing}">
  <template x-if="!testing">
    <span class="flex items-center gap-2">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Refresh Status
    </span>
  </template>
  <template x-if="testing">
    <span class="flex items-center gap-2">
      <svg class="animate-spin w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      Testing...
    </span>
  </template>
</button>
