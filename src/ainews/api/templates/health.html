{% extends "base.html" %}

{% block title %}Health{% endblock %}

{% block content %}
<div class="space-y-6">
  <h1 class="text-2xl font-bold tracking-tight">System Health</h1>

  <div hx-get="/health/probes" hx-trigger="load, every 30s" hx-target="#health-grid" hx-indicator="#health-spinner">
    <div id="health-spinner" class="htmx-indicator text-center py-4">
      <div class="inline-flex items-center gap-2 text-sm text-surface-700/70 dark:text-surface-200/60">
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        Checking health…
      </div>
    </div>
    <div id="health-grid">
      {% include "partials/health_grid.html" %}
    </div>
  </div>
</div>
{% endblock %}
