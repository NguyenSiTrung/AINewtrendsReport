{% extends "base.html" %}

{% block title %}{{ "Edit Schedule" if schedule else "New Schedule" }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto space-y-6">
  <h1 class="text-3xl font-bold tracking-tight text-surface-900 dark:text-white">{{ "Edit Schedule" if schedule else "New Schedule" }}</h1>

  <div class="bg-white dark:bg-surface-900 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:border dark:border-surface-800 p-6 md:p-8">
    <form method="POST" action="{{ '/schedules/' ~ schedule.id if schedule else '/schedules/new' }}" class="space-y-5" x-data="{ loading: false }" @submit="loading = true">
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">

      <div>
        <label for="name" class="block text-sm font-medium mb-1.5">Name</label>
        <input type="text" id="name" name="name" required
               value="{{ schedule.name if schedule else '' }}"
               class="form-input"
               placeholder="weekly-ai-news">
      </div>

      <div>
        <label for="cron_expr" class="block text-sm font-medium mb-1.5">Cron Expression</label>
        <input type="text" id="cron_expr" name="cron_expr" required
               value="{{ schedule.cron_expr if schedule else '0 7 * * 1' }}"
               class="form-input"
               placeholder="0 7 * * 1">
        <p class="text-xs text-surface-700/50 dark:text-surface-200/40 mt-1">minute hour day month weekday</p>
      </div>

      <div>
        <label for="timeframe_days" class="block text-sm font-medium mb-1.5">Timeframe (days)</label>
        <input type="number" id="timeframe_days" name="timeframe_days" min="1" max="90"
               value="{{ schedule.timeframe_days if schedule else 7 }}"
               class="form-input">
      </div>

      <div class="flex items-center gap-4 pt-2">
        <button type="submit" class="btn-primary" :disabled="loading" :class="{ 'btn-loading': loading }">
          <span x-text="loading ? 'Saving…' : '{{ 'Save Changes' if schedule else 'Create Schedule' }}'"></span>
        </button>
        <a href="/schedules" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
