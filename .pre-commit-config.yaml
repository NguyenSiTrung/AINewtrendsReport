repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.0.0
    hooks:
      - id: mypy
        additional_dependencies:
          - typer>=0.15
          - pydantic-settings>=2.7
          - structlog>=24.4
        args: [--config-file=pyproject.toml]
        pass_filenames: false
